<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Capsule</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f5f7fb;
      padding: 30px;
      color: #222;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,.08);
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    h2 {
      margin-bottom: 12px;
      color: #444;
    }

    #topics {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .topic {
      background: #e8f0fe;
      color: #1a73e8;
      padding: 8px 14px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: bold;
    }

    .insight {
      margin-bottom: 10px;
    }

    .message {
      border-left: 4px solid #4caf50;
      padding: 10px 15px;
      margin-bottom: 15px;
      background: #fafafa;
      border-radius: 6px;
    }

    .role {
      font-weight: bold;
      margin-bottom: 5px;
    }

    .meta {
      color: gray;
      margin-top: 10px;
      font-size: 14px;
    }

  </style>
</head>

<body>

<div class="container">

  <div class="card">
    <h1 id="title">Loading...</h1>
    <p id="summary"></p>

    <div class="meta">
      <span id="messageCount"></span>
    </div>
  </div>

  <div class="card">

    <h2>🏷 Key Topics</h2>

    <div id="topics"></div>

  </div>

  <div class="card">

    <h2>💡 Insights</h2>

    <div id="insights"></div>

  </div>

  <div class="card">

    <h2>💬 Conversation</h2>

    <div id="conversation"></div>

  </div>

</div>

<script src="viewer.js"></script>

</body>
</html>
