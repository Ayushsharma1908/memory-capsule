<!DOCTYPE html>
<html>
<head>
  <title>Memory Capsule</title>
  <style>
    body {
      font-family: Arial;
      width: 320px;
      padding: 10px;
    }

    h2 {
      margin-bottom: 10px;
    }

    .capsule {
      display: block;
      width: 100%;
      text-align: left;
      background: white;
      padding: 8px;
      border: 1px solid #ddd;
      margin-bottom: 8px;
      border-radius: 6px;
      cursor: pointer;
    }

    .title {
      display: block;
      font-weight: bold;
    }

    .meta {
      display: block;
      font-size: 12px;
      color: gray;
    }

    .selected {
      border-color: #1a73e8;
    }

    #status {
      min-height: 16px;
      margin-top: 8px;
      font-size: 12px;
      color: #256029;
    }

    #status.error {
      color: #b00020;
    }

    button {
      margin-top: 10px;
      width: 100%;
      padding: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h2>Memory Capsule</h2>

<div id="capsuleList"></div>
<hr>

<h3>Generated Capsules</h3>

<div id="generatedCapsules"></div>
<button id="exportBtn">
  Export Selected Chat
</button><button id="generateCapsuleBtn">
  Generate Capsule
</button>
<div id="status"></div>
<script type="module" src="popup.js"></script>
</body>
</html>
